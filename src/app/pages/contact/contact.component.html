<section class="contact section" aria-labelledby="contact-heading">
  <div class="contact__grid container">
    <div class="contact__panel">
      <p class="section-subtitle">Reach Out</p>
      <h2 id="contact-heading" class="section-title">Contact</h2>
      <p class="contact__description">
        I am available for frontend work, consulting, and collaboration. Send a message and I'll reply as soon as possible.
      </p>

      <div class="contact__details">
        <div class="contact__detail">
          <span class="contact__icon" aria-hidden="true">✉️</span>
          <div>
            <p class="contact__label">Email</p>
            <a href="mailto:hellogmail.com">hellogmail.com</a>
          </div>
        </div>

        <div class="contact__detail">
          <span class="contact__icon" aria-hidden="true">📞</span>
          <div>
            <p class="contact__label">Phone</p>
            <a href="tel:+1234567890">+1 234 567 890</a>
          </div>
        </div>

        <div class="contact__detail">
          <span class="contact__icon" aria-hidden="true">📍</span>
          <div>
            <p class="contact__label">Location</p>
            <p>Remote / Anywhere</p>
          </div>
        </div>

        <div class="contact__detail">
          <span class="contact__icon" aria-hidden="true">🔗</span>
          <div>
            <p class="contact__label">LinkedIn</p>
            <a href="https://linkedin.com/in/adnan" target="_blank" rel="noopener noreferrer">linkedin.com/in/adnan</a>
          </div>
        </div>

        <div class="contact__detail">
          <span class="contact__icon" aria-hidden="true">💻</span>
          <div>
            <p class="contact__label">GitHub</p>
            <a href="#" target="_blank" rel="noopener noreferrer">github.com/adnan</a>
          </div>
        </div>
      </div>

      <div class="contact__social">
        <a href="#" class="social-pill">LinkedIn</a>
        <a href="#" class="social-pill">GitHub</a>
      </div>
    </div>

    <form class="contact__form" novalidate>
      <div class="field-group">
        <label for="contact-name">Name</label>
        <input id="contact-name" type="text" placeholder="Your name" required />
      </div>

      <div class="field-group">
        <label for="contact-email">Email</label>
        <input id="contact-email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="field-group">
        <label for="contact-subject">Subject</label>
        <input id="contact-subject" type="text" placeholder="Project inquiry" />
      </div>

      <div class="field-group">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" rows="6" placeholder="Tell me about your project"></textarea>
      </div>

      <button type="submit" class="btn btn--primary contact__submit">
        Submit Message
      </button>
    </form>
  </div>
</section>
